name: CI

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: true

      - run: go build ./...
      - run: go vet ./...

      - name: goreleaser check
        uses: goreleaser/goreleaser-action@v6
        with:
          version: "~> v2"
          args: check
