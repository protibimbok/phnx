name: Release

on:
  push:
    tags:
      - "v*.*.*"

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: true

      - name: Resolve goreleaser args
        id: args
        env:
          AUR_KEY_VAL: ${{ secrets.AUR_KEY }}
        run: |
          ARGS="release --clean"
          [ -z "$AUR_KEY_VAL" ] && ARGS="$ARGS --skip=aurs"
          echo "args=$ARGS" >> "$GITHUB_OUTPUT"

      - name: Run goreleaser
        uses: goreleaser/goreleaser-action@v6
        with:
          version: "~> v2"
          args: ${{ steps.args.outputs.args }}
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          AUR_KEY: ${{ secrets.AUR_KEY }}

      - name: Get tag
        id: tag
        run: echo "tag=${GITHUB_REF_NAME}" >> "$GITHUB_OUTPUT"

      - name: Trigger pkg-dist update
        env:
          PKG_DIST_TOKEN: ${{ secrets.PKG_DIST_TOKEN }}
        run: |
          if [ -z "${PKG_DIST_TOKEN}" ]; then
            echo "PKG_DIST_TOKEN not configured; skipping pkg-dist trigger"
            exit 0
          fi
          curl -fsSL -X POST \
            -H "Authorization: token ${PKG_DIST_TOKEN}" \
            -H "Accept: application/vnd.github+json" \
            https://api.github.com/repos/protibimbok/pkg-dist/dispatches \
            -d "{\"event_type\":\"release-published\",\"client_payload\":{\"package\":\"phnx\",\"tag\":\"${{ steps.tag.outputs.tag }}\"}}"
